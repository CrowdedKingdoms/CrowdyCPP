fragment PlayerWasmModuleFields on PlayerWasmModule {
  moduleId
  appId
  gridId
  name
  description
  authorUserId
  authorOrgId
  enabled
  currentVersionId
  circuitState
  lastError
  createdAt
  updatedAt
}

fragment PlayerWasmModuleVersionFields on PlayerWasmModuleVersion {
  versionId
  moduleId
  versionNo
  target
  sourceFilesJson
  openSource
  compileStatus
  compileLog
  compiledSizeBytes
  createdAt
}

mutation PlayerComputeDeploy($input: DeployPlayerComputeInput!) {
  playerComputeDeploy(input: $input) {
    ...PlayerWasmModuleVersionFields
  }
}

mutation PlayerComputeSetEnabled(
  $appId: BigInt!
  $gridId: BigInt!
  $name: String!
  $enabled: Boolean!
) {
  playerComputeSetEnabled(
    appId: $appId
    gridId: $gridId
    name: $name
    enabled: $enabled
  ) {
    ...PlayerWasmModuleFields
  }
}

query PlayerComputeMyModules($appId: BigInt!) {
  playerComputeMyModules(appId: $appId) {
    ...PlayerWasmModuleFields
  }
}

query PlayerComputeVersions(
  $appId: BigInt!
  $gridId: BigInt!
  $name: String!
) {
  playerComputeVersions(appId: $appId, gridId: $gridId, name: $name) {
    ...PlayerWasmModuleVersionFields
  }
}

mutation PlayerComputeDelete(
  $appId: BigInt!
  $gridId: BigInt!
  $name: String!
) {
  playerComputeDelete(appId: $appId, gridId: $gridId, name: $name)
}

mutation PlayerComputeInvoke(
  $appId: BigInt!
  $gridId: BigInt!
  $moduleName: String!
  $exportName: String!
  $paramsJson: String
) {
  playerComputeInvoke(
    appId: $appId
    gridId: $gridId
    moduleName: $moduleName
    exportName: $exportName
    paramsJson: $paramsJson
  ) {
    resultBase64
    resultJson
    fuelUsed
    durationUs
  }
}

fragment PlayerWasmModuleRunFields on PlayerWasmModuleRun {
  runId
  appId
  gridId
  moduleId
  moduleName
  executedAsUserId
  flowId
  triggerSource
  startedAt
  durationUs
  fuelUsed
  success
  errorMessage
}

query PlayerComputeUsage($appId: BigInt!) {
  playerComputeUsage(appId: $appId) {
    appId
    hourUnitsUsed
    dayUnitsUsed
    unitsPerHour
    unitsPerDay
    compilesThisHour
    maxCompilesPerHour
    gateStatus
    gateReason
  }
}

query PlayerComputeRuns(
  $appId: BigInt!
  $gridId: BigInt!
  $moduleName: String
  $success: Boolean
  $limit: Int
  $offset: Int
) {
  playerComputeRuns(
    appId: $appId
    gridId: $gridId
    moduleName: $moduleName
    success: $success
    limit: $limit
    offset: $offset
  ) {
    ...PlayerWasmModuleRunFields
  }
}

query PlayerComputeLogs(
  $appId: BigInt!
  $gridId: BigInt!
  $moduleName: String
  $limit: Int
) {
  playerComputeLogs(
    appId: $appId
    gridId: $gridId
    moduleName: $moduleName
    limit: $limit
  ) {
    ...PlayerWasmModuleRunFields
  }
}

mutation PlayerComputeSetSwitch(
  $appId: BigInt!
  $scope: String!
  $disabled: Boolean!
  $scopeRef: BigInt
  $reason: String
) {
  playerComputeSetSwitch(
    appId: $appId
    scope: $scope
    disabled: $disabled
    scopeRef: $scopeRef
    reason: $reason
  )
}

query PlayerComputeSwitches($appId: BigInt!) {
  playerComputeSwitches(appId: $appId) {
    switchId
    appId
    scope
    scopeRef
    reason
    disabledAt
  }
}
