query AppUserAccessByApp(
  $appId: BigInt!
  $status: String
  $limit: Int
  $offset: Int
) {
  appUserAccessByApp(
    appId: $appId
    status: $status
    limit: $limit
    offset: $offset
  ) {
    appUserAccessId
    appId
    userId
    tierId
    status
    grantedBy
    subscriptionId
    expiresAt
    createdAt
    updatedAt
  }
}

query AppUserAccessConnection(
  $appId: BigInt!
  $first: Int
  $after: String
  $status: String
) {
  appUserAccessConnection(
    appId: $appId
    first: $first
    after: $after
    status: $status
  ) {
    edges {
      cursor
      node {
        appUserAccessId
        appId
        userId
        tierId
        status
        grantedBy
        subscriptionId
        expiresAt
        createdAt
        updatedAt
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    totalCount
  }
}
