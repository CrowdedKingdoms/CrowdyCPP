mutation UpdateEnvironmentBillingTiers(
  $input: UpdateEnvironmentBillingTiersInput!
) {
  updateEnvironmentBillingTiers(input: $input) {
    id
    orgId
    slug
    displayName
    status
    billingStatus
    environmentClass
    singleBoxFlavor
    primaryCloud
    primaryRegion
    desiredEnvironmentVersion
    observedEnvironmentVersion
    gameApiMinServers
    gameApiMaxServers
    udpBuddyMinServers
    udpBuddyMaxServers
    loadBalancerCount
    createdAt
    updatedAt
  }
}
