query UsersPaginated($query: String, $limit: Int, $offset: Int) {
  usersPaginated(query: $query, limit: $limit, offset: $offset) {
    items {
      userId
      email
      gamertag
      disambiguation
      isConfirmed
      createdAt
      grantEarlyAccess
      grantEarlyAccessOverride
      orgId
      externalId
      userType
      isSuperAdmin
    }
    pageInfo {
      totalCount
      limit
      offset
    }
  }
}

query UsersConnection($first: Int, $after: String, $query: String) {
  usersConnection(first: $first, after: $after, query: $query) {
    edges {
      cursor
      node {
        userId
        email
        gamertag
        disambiguation
        isConfirmed
        createdAt
        grantEarlyAccess
        grantEarlyAccessOverride
        orgId
        externalId
        userType
        isSuperAdmin
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    totalCount
  }
}
