query EnvironmentQuote($input: EnvironmentQuoteInput!) {
  environmentQuote(input: $input) {
    datacenter
    databaseFlavor
    gameApiFlavor
    udpBuddyFlavor
    caddyFlavor
    gameApiMinServers
    gameApiMaxServers
    udpBuddyMinServers
    udpBuddyMaxServers
    loadBalancerCount
    environmentClass
    singleBoxFlavor
    hourlyCostCents
    firstDayReserveCents
    walletBalanceCents
    availableBalanceCents
    currency
    canCreate
  }
}
