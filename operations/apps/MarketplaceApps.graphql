query MarketplaceApps(
  $filter: AppMarketplaceFilterInput
  $limit: Int
  $offset: Int
) {
  apps(filter: $filter, limit: $limit, offset: $offset) {
    items {
      appId
      orgId
      name
      slug
      description
      visibility
      status
      metadata
      splitMode
      gameApiUrl
      createdAt
      updatedAt
      org {
        orgId
        slug
        name
      }
    }
    pageInfo {
      totalCount
      limit
      offset
    }
  }
}

query AppsConnection(
  $first: Int
  $after: String
  $filter: AppMarketplaceFilterInput
) {
  appsConnection(first: $first, after: $after, filter: $filter) {
    edges {
      cursor
      node {
        appId
        orgId
        name
        slug
        description
        visibility
        status
        metadata
        splitMode
        gameApiUrl
        createdAt
        updatedAt
        org {
          orgId
          slug
          name
        }
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    totalCount
  }
}
