name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  content-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check public content policy
        run: ./scripts/check-content-policy.sh

  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libssl-dev
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl@3 curl || true
      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install curl openssl --triplet x64-windows
      - name: Configure
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          ${{ runner.os == 'Windows' && '-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake' || '' }}
      - name: Build
        run: cmake --build build --config Release -j 4
      - name: Unit tests
        run: ctest --test-dir build -C Release --output-on-failure
